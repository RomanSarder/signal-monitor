info:
  name: Create monitor
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/monitors
  body:
    type: json
    data: |-
      {
        "name": "Hiring signal",
        "sources": ["hs"],
        "keywords": ["who is hiring", "we are hiring", "hiring remote engineer", "job opening"],
        "intervalMinutes": 30
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
